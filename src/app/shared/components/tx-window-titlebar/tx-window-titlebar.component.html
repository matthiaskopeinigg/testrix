<header
  class="tx-titlebar disable-select"
  [class.tx-titlebar--darwin]="isDarwin()"
  [class.tx-titlebar--native-frame]="useNativeFrame()"
  (mousedown)="handleTitlebarMouseDown($event)"
>
  <div class="tx-titlebar__lead">
    @if (!useNativeFrame()) {
      <div class="tx-titlebar__brand">
        <tx-brand-logo [size]="24" />
        <span class="tx-titlebar__product">Testrix</span>
        @if (showDevToolkit()) {
          <span
            class="tx-titlebar__dev-badge"
            txTooltip="Development build (npm run dev)"
            txTooltipPosition="bottom"
          >Dev</span>
        }
      </div>
    } @else if (showDevToolkit()) {
      <span class="tx-titlebar__dev-badge tx-titlebar__dev-badge--native" title="Development build">Dev</span>
    }

    @if (showProfilePicker()) {
      @if (!useNativeFrame()) {
        <span class="tx-titlebar__sep" aria-hidden="true"></span>
      }
      <div class="tx-titlebar__profile" aria-label="Workspace profile">
        <tx-icon
          class="tx-titlebar__profile-icon"
          name="users"
          [size]="15"
          aria-hidden="true"
        />
        <tx-dropdown
          class="tx-titlebar__profile-dropdown"
          [options]="profileOptions()"
          [disabled]="profileSwitching()"
          [selectedValue]="activeProfileId()"
          (valueChange)="handleProfileChange($event)"
          panelActionLabel="Manage profiles"
          panelActionIcon="settings"
          (panelAction)="handleOpenProfileManager()"
          ariaLabel="Workspace profile"
          placeholder="Profile"
          placement="bottom-start"
          hint="Collections, tabs, and history are per profile. Theme and settings stay shared."
          hintPosition="bottom"
        />
      </div>
    }
  </div>

  @if (!useNativeFrame()) {
    <div class="tx-titlebar__drag" aria-hidden="true"></div>
  }

  <nav class="tx-titlebar__trailing" aria-label="Window chrome">
    <button
      type="button"
      class="tx-titlebar-btn tx-titlebar-btn--chrome"
      txTooltip="Cookie jar"
      txTooltipPosition="bottom"
      aria-label="Open cookie jar"
      (click)="handleOpenCookies()"
    >
      <tx-icon name="box" [size]="16" />
    </button>
    <button
      type="button"
      class="tx-titlebar-btn tx-titlebar-btn--chrome"
      txTooltip="Settings"
      txTooltipPosition="bottom"
      aria-label="Open settings"
      (click)="handleOpenSettings()"
    >
      <tx-icon name="settingsGear" [size]="16" />
    </button>

    @if (hasChromeBridge()) {
      <div class="tx-titlebar__window-controls" aria-label="Window controls">
        <button
          type="button"
          class="tx-titlebar-btn tx-titlebar-btn--window"
          (click)="handleMinimize()"
          txTooltip="Minimize"
          txTooltipPosition="bottom"
          aria-label="Minimize window"
        >
          <tx-icon name="minimize" [size]="13" />
        </button>
        <button
          type="button"
          class="tx-titlebar-btn tx-titlebar-btn--window"
          (click)="handleMaximizeToggle()"
          txTooltip="Maximize"
          txTooltipPosition="bottom"
          aria-label="Toggle maximize"
        >
          <tx-icon name="maximize" [size]="13" />
        </button>
        <button
          type="button"
          class="tx-titlebar-btn tx-titlebar-btn--window tx-titlebar-btn--close"
          (click)="handleClose()"
          txTooltip="Close"
          txTooltipPosition="bottom"
          aria-label="Close window"
        >
          <tx-icon name="close" [size]="13" />
        </button>
      </div>
    }
  </nav>
</header>

<tx-cookie-manager [open]="cookiesOpen()" (closed)="handleCloseCookies()" />

<tx-settings-popup [open]="settingsOpen()" (closed)="handleCloseSettings()" />

<tx-profile-manager-modal [open]="profileManagerOpen()" (closed)="handleCloseProfileManager()" />
