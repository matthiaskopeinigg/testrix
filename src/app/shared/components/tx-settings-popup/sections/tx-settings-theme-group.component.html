<div class="tx-settings__theme-group">
  <h3 class="tx-settings__theme-group-heading">{{ group().label }}</h3>

  <div class="tx-settings__theme-options">
    @for (card of group().cards; track card.id) {
      <button
        type="button"
        class="tx-settings__theme-option"
        [class.is-selected]="isActive(card.id)"
        (click)="handleSelect(card.id)"
      >
        <tx-theme-layout-preview [palette]="card.palette" [compact]="true" />
        <span class="tx-settings__theme-name">{{ card.palette.label }}</span>
      </button>
    }
  </div>
</div>
