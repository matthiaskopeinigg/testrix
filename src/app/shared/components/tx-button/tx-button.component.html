<button
  class="tx-button"
  [class.is-loading]="loading()"
  [attr.type]="buttonType()"
  [attr.data-variant]="variant()"
  [attr.data-size]="size()"
  [attr.aria-label]="ariaLabel() ?? null"
  [attr.title]="ariaLabel() ?? null"
  [disabled]="isInteractionBlocked()"
  [attr.aria-busy]="loading() ? 'true' : null"
  (click)="handlePress($event)"
>
  @if (loading()) {
    <span class="tx-button__spinner" aria-hidden="true">
      <tx-spinner size="sm" [ariaLabel]="loadingLabel()" />
    </span>
  }
  <span class="tx-button__content" [class.is-dimmed]="loading()">
    <ng-content />
  </span>
</button>
