<div class="interceptor-sidebar-panel">
  <button
    type="button"
    class="interceptor-sidebar-panel__settings-toggle"
    [attr.aria-expanded]="settingsExpanded()"
    (click)="handleToggleSettings()"
  >
    <tx-icon
      name="chevronDown"
      [size]="14"
      class="interceptor-sidebar-panel__settings-chevron"
      [class.is-collapsed]="!settingsExpanded()"
      aria-hidden="true"
    />
    <span>Interceptor settings</span>
  </button>

  @if (settingsExpanded()) {
    <section class="interceptor-sidebar-panel__settings" aria-label="Interceptor settings">
      <tx-form-field
        class="interceptor-sidebar-panel__start-url"
        label="Start URL"
        controlId="interceptor-start-url"
      >
        <tx-input
          id="interceptor-start-url"
          type="url"
          [ngModel]="startUrl()"
          (ngModelChange)="handleStartUrlChange($event)"
          placeholder="https://example.com"
          [disabled]="running()"
        />
      </tx-form-field>

      <div class="interceptor-sidebar-panel__runtime" aria-label="Interceptor runtime">
        <div class="interceptor-sidebar-panel__runtime-status">
          <span
            class="interceptor-sidebar-panel__status-dot"
            [class.is-running]="running()"
            aria-hidden="true"
          ></span>
          <div class="interceptor-sidebar-panel__status-copy">
            <span class="interceptor-sidebar-panel__status-label">
              {{ running() ? 'Running' : 'Stopped' }}
            </span>
            @if (running()) {
              <span class="interceptor-sidebar-panel__status-hint">
                Browser window open — rules apply to its outbound traffic
              </span>
            } @else {
              <span class="interceptor-sidebar-panel__status-hint">
                Opens a browser window to exercise your rules
              </span>
            }
          </div>
        </div>
        <tx-button
          class="interceptor-sidebar-panel__runtime-action"
          [variant]="running() ? 'secondary' : 'primary'"
          (pressed)="handleToggle()"
        >
          {{ running() ? 'Stop interceptor' : 'Start interceptor' }}
        </tx-button>
      </div>
    </section>
  }
</div>

<app-workspace-sidebar-panel-shell
  class="interceptor-sidebar-panel__shell"
  [searchPlaceholder]="searchPlaceholder()"
  [searchAriaLabel]="searchAriaLabel()"
  [allFoldersExpanded]="allExpanded()"
  [showFolderToggle]="true"
  [showFilterButton]="false"
  [showSortButton]="false"
  (searchChange)="handleSearch($event)"
  (allFoldersExpandedChange)="handleExpandAll($event)"
>
  <div workspacePanelToolbarActions>
    <button
      type="button"
      class="workspace-panel-shell__icon-btn"
      [class.is-pressed]="filterToolbarActive()"
      aria-label="Filter interceptor rules"
      txTooltip="Filter interceptor rules"
      txTooltipPosition="bottom"
      [attr.aria-expanded]="filterMenuOpen()"
      (click)="handleFilterToolbarClick($event)"
    >
      <tx-icon name="filter" [size]="16" aria-hidden="true" />
    </button>
    <button
      type="button"
      class="workspace-panel-shell__icon-btn"
      [class.is-pressed]="sortToolbarActive()"
      aria-label="Sort interceptor rules"
      txTooltip="Sort interceptor rules"
      txTooltipPosition="bottom"
      [attr.aria-expanded]="sortMenuOpen()"
      (click)="handleSortToolbarClick($event)"
    >
      <tx-icon name="list" [size]="16" aria-hidden="true" />
    </button>
  </div>

  <div
    class="interceptor-sidebar-panel__body"
    (contextmenu)="handleTreeAreaContextMenu($event)"
  >
    <tx-tree
      class="interceptor-sidebar-panel__tree"
      [entranceStagger]="true"
      [emptyMessage]="treeEmptyMessage()"
      [nodes]="filteredNodes()"
      [config]="treeConfig()"
      [expandedIds]="expandedIds()"
      [selectionIds]="treeSelectionIds()"
      [renamingNodeId]="renamingNodeId()"
      (nodesChange)="handleNodesChange($event)"
      (expandedChange)="handleExpandedChange($event)"
      (nodeClick)="handleNodeClick($event)"
      (nodeDblClick)="handleNodeDblClick($event)"
      (renameCommit)="handleRenameCommit($event)"
      (renameCancel)="handleRenameCancel()"
      (rowContextMenu)="handleRowContextMenu($event)"
    />
  </div>
</app-workspace-sidebar-panel-shell>

<tx-context-menu
  [open]="contextMenuOpen()"
  [position]="contextMenuPosition()"
  [items]="contextMenuItems()"
  (itemSelect)="handleContextMenuSelect($event)"
  (closed)="handleContextMenuClosed()"
/>

<tx-context-menu
  [open]="filterMenuOpen()"
  [position]="filterMenuPosition()"
  [items]="filterMenuItems()"
  (itemSelect)="handleFilterMenuSelect($event)"
  (closed)="handleFilterMenuClosed()"
/>

<tx-context-menu
  [open]="sortMenuOpen()"
  [position]="sortMenuPosition()"
  [items]="sortMenuItems()"
  (itemSelect)="handleSortMenuSelect($event)"
  (closed)="handleSortMenuClosed()"
/>

<tx-confirm-dialog
  [open]="deleteOpen()"
  title="Delete item"
  [message]="deleteMessage()"
  confirmLabel="Delete"
  variant="danger"
  (confirmed)="handleDeleteConfirmed()"
  (closed)="handleDeleteClosed()"
/>
