<div class="request-panel ts-flow-step-panel">
  <tx-form-field label="Request source" controlId="ts-req-source">
    <tx-dropdown
      controlId="ts-req-source"
      [options]="requestSourceOptions"
      [ngModel]="requestSource()"
      (ngModelChange)="handleRequestSourceChange($event)"
    />
  </tx-form-field>

  @if (requestSource() === 'manual') {
    @if (needsManualUrl()) {
      <tx-banner variant="warning" title="HTTP Request">
        Specify a URL for this manual request.
      </tx-banner>
    }

    <h2 class="request-panel__title">Request</h2>
    <div class="ts-flow-step-panel__row-2">
      <tx-form-field label="Method" controlId="ts-req-method">
        <tx-dropdown
          controlId="ts-req-method"
          [options]="httpMethodOptions"
          [ngModel]="cfg().method"
          (ngModelChange)="patch({ method: $event })"
        />
      </tx-form-field>
      <tx-form-field class="ts-flow-step-panel__grow" label="URL" controlId="ts-req-url">
        <tx-variable-input
          controlId="ts-req-url"
          [catalog]="variableCatalog()"
          [ngModel]="cfg().url"
          (ngModelChange)="patch({ url: $event })"
          placeholder="https://api.example.com/path"
        />
      </tx-form-field>
    </div>

    <h2 class="request-panel__title">Headers</h2>
    <tx-key-value-list
      keyLabel="Header"
      keyInput="http-headers"
      valueLabel="Value"
      addLabel="Add header"
      valueInput="variables"
      [rows]="headerRows()"
      [variableCatalog]="variableCatalog()"
      (rowsChange)="handleHeadersChange($event)"
    />

    <h2 class="request-panel__title">Query params</h2>
    <tx-key-value-list
      keyLabel="Param"
      valueLabel="Value"
      addLabel="Add param"
      valueInput="variables"
      [rows]="queryRows()"
      [variableCatalog]="variableCatalog()"
      (rowsChange)="handleQueryChange($event)"
    />

    <tx-form-field label="Body type" controlId="ts-req-body-type">
      <tx-dropdown
        controlId="ts-req-body-type"
        [options]="bodyTypeOptions"
        [ngModel]="cfg().bodyType"
        (ngModelChange)="patch({ bodyType: $event })"
      />
    </tx-form-field>

    <tx-form-field label="Body" controlId="ts-req-body">
      <tx-textarea
        controlId="ts-req-body"
        [ngModel]="cfg().body"
        (ngModelChange)="patch({ body: $event })"
        [rows]="8"
      />
    </tx-form-field>
  } @else {
    @if (needsCollectionRequest()) {
      <tx-banner variant="warning" title="HTTP Request">
        Select a request from collections.
      </tx-banner>
    }

    <app-ts-flow-collection-request-picker
      [collectionRequestId]="cfg().collectionRequestId"
      (collectionRequestIdChange)="patch({ collectionRequestId: $event })"
    />
  }
</div>
