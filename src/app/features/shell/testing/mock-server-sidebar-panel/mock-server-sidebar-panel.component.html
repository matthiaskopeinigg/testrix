<app-workspace-sidebar-panel-shell
  [searchPlaceholder]="searchPlaceholder()"
  [searchAriaLabel]="searchAriaLabel()"
  [showFolderToggle]="false"
  [showFilterButton]="false"
  [showSortButton]="false"
  (searchChange)="handleSearch($event)"
>
  <div workspacePanelToolbarActions class="mock-server-sidebar-panel__toolbar">
    <tx-button variant="secondary" (pressed)="handleToggleServer()">
      {{ running() ? 'Stop' : 'Start' }}
    </tx-button>
    <button
      type="button"
      class="workspace-panel-shell__icon-btn"
      aria-label="Add mock endpoint"
      title="Add mock endpoint"
      (click)="handleAdd()"
    >
      <tx-icon name="plus" [size]="16" aria-hidden="true" />
    </button>
  </div>

  @if (running()) {
    <p class="mock-server-sidebar-panel__status">
      <tx-tag variant="success">Running</tx-tag>
      <span>{{ options().host }}:{{ options().port }}</span>
    </p>
  }

  <ul class="testing-list-sidebar-panel__list" role="list">
    @for (item of filtered(); track item.id) {
      <li>
        <button
          type="button"
          class="testing-list-sidebar-panel__item"
          [class.is-active]="activeItemId() === item.id"
          (click)="handleOpen(item.id)"
        >
          <tx-icon name="api" [size]="16" aria-hidden="true" />
          <span>{{ item.method }} {{ item.name }}</span>
        </button>
      </li>
    } @empty {
      <li class="testing-list-sidebar-panel__empty" role="status">No mock endpoints yet.</li>
    }
  </ul>
</app-workspace-sidebar-panel-shell>
