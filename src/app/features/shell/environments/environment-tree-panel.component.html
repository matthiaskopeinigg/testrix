<app-workspace-sidebar-panel-shell
  class="environment-tree-panel"
  searchPlaceholder="Search"
  searchAriaLabel="Search variables in environment"
  [allFoldersExpanded]="allExpanded()"
  [useDefaultToolbarActions]="false"
  (searchChange)="handleSearch($event)"
  (allFoldersExpandedChange)="handleExpandAll($event)"
>
  <div workspacePanelToolbarActions class="environment-tree-panel__toolbar-actions">
    <button
      type="button"
      class="workspace-panel-shell__icon-btn"
      [class.is-pressed]="filterToolbarActive()"
      aria-label="Filter variables"
      [attr.aria-expanded]="filterMenuOpen()"
      (click)="handleFilterToolbarClick($event)"
    >
      <tx-icon name="filter" [size]="16" />
    </button>
    <button
      type="button"
      class="workspace-panel-shell__icon-btn"
      [class.is-pressed]="sortToolbarActive()"
      aria-label="Sort variables"
      [attr.aria-expanded]="sortMenuOpen()"
      (click)="handleSortToolbarClick($event)"
    >
      <tx-icon name="list" [size]="16" />
    </button>
  </div>

  <div class="environment-tree-panel__body" (contextmenu)="handleTreeAreaContextMenu($event)">
    @if (displayNodes().length === 0) {
      <p class="environment-tree-panel__empty">{{ emptyStateMessage() }}</p>
    } @else {
      <tx-tree
        class="environment-tree-panel__tree"
        [nodes]="displayNodes()"
        [config]="treeConfig()"
        [expandedIds]="expandedIds()"
        [selectionIds]="treeSelectionIds()"
        [renamingNodeId]="renamingNodeId()"
        (nodesChange)="handleNodesChange($event)"
        (expandedChange)="handleExpandedChange($event)"
        (nodeClick)="handleNodeClick($event)"
        (nodeDblClick)="handleNodeDblClick($event)"
        (renameCommit)="handleRenameCommit($event)"
        (renameCancel)="handleRenameCancel()"
        (rowContextMenu)="handleRowContextMenu($event)"
      />
    }
  </div>
</app-workspace-sidebar-panel-shell>

<tx-context-menu
  [open]="filterMenuOpen()"
  [position]="filterMenuPosition()"
  [items]="filterMenuItems()"
  (itemSelect)="handleFilterMenuSelect($event)"
  (closed)="handleFilterMenuClosed()"
/>

<tx-context-menu
  [open]="sortMenuOpen()"
  [position]="sortMenuPosition()"
  [items]="sortMenuItems()"
  (itemSelect)="handleSortMenuSelect($event)"
  (closed)="handleSortMenuClosed()"
/>

<tx-context-menu
  [open]="contextMenuOpen()"
  [position]="contextMenuPosition()"
  [items]="contextMenuItems()"
  (itemSelect)="handleContextMenuSelect($event)"
  (closed)="handleContextMenuClosed()"
/>

<tx-confirm-dialog
  [open]="deleteOpen()"
  title="Delete"
  [message]="deleteMessage()"
  confirmLabel="Delete"
  variant="danger"
  (confirmed)="handleDeleteConfirmed()"
  (closed)="handleDeleteClosed()"
/>
