<section
  class="tx-shell"
  [class.tx-shell--debug]="isDebugRoute()"
  [class.tx-shell--home]="isHomeRoute()"
>
  <app-tx-window-titlebar />

  <tx-error-banner />

  <tx-update-banner [visible]="showUpdateBanner()" />

  @if (showInstallOverlay()) {
    <tx-update-install-overlay [visible]="true" />
  }

  @if (showProfileSwitchOverlay()) {
    <tx-profile-switch-overlay
      [visible]="true"
      [title]="profileSwitchTitle()"
      [description]="profileSwitchDescription()"
    />
  }

  @if (layoutOnboarding.active()) {
    <tx-layout-onboarding-overlay
      [visible]="true"
      (onboardingCompleted)="handleOnboardingCompleted($event)"
    />
  }

  <div class="tx-shell__stage">
    <main class="tx-shell__body" #shellMain>
      <router-outlet />
    </main>
    @if (hasNotification()) {
      <tx-notification-host />
    }
    <tx-settings-popup [open]="settingsPopup.open()" (closed)="handleCloseSettings()" />
    <tx-help-popup [open]="helpPopup.open()" (closed)="handleCloseHelp()" />
    <tx-teams-panel [open]="teamsPanel.open()" (closed)="handleCloseTeamsPanel()" />
    <tx-command-palette [open]="commandPalette.open()" (closed)="handleCloseCommandPalette()" />
    <tx-import-export-dialog />
    <tx-batch-import-dialog />
  </div>
</section>
