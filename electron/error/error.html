<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Testrix · Problem</title>
    <link rel="stylesheet" href="./error.css" />
  </head>
  <body class="tx-error">
    <div class="tx-error-shell">
      <header class="tx-error-titlebar">
        <div class="tx-error-titlebar__brand" aria-hidden="true">
          <img class="tx-error-titlebar__mark" src="./assets/logo.svg" width="20" height="20" alt="" />
          <span class="tx-error-titlebar__name">Testrix</span>
          <span class="tx-error-titlebar__sep"></span>
          <span class="tx-error-titlebar__context">Problem</span>
        </div>
        <div class="tx-error-titlebar__drag" aria-hidden="true"></div>
        <button
          type="button"
          class="tx-error-titlebar__close"
          aria-label="Close Testrix"
          title="Close"
        >
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M6 6l12 12M18 6 6 18" />
          </svg>
        </button>
      </header>

      <main class="tx-error-body" aria-live="assertive">
        <div class="tx-error-hero">
          <div class="tx-error-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path
                d="M12 2.25c.41 0 .79.22 1 .58l8.12 14.07a1.15 1.15 0 0 1-1 1.72H3.88a1.15 1.15 0 0 1-1-1.72L10.99 2.83c.21-.36.59-.58 1-.58Z"
              />
              <path d="M12 9v5.25M12 16.5h.01" />
            </svg>
          </div>
          <div class="tx-error-copy">
            <h1 class="tx-error-title">Could not start correctly</h1>
            <p class="tx-error-lede">Testrix hit a problem while starting up.</p>
          </div>
        </div>

        <div class="tx-error-detail-wrap">
          <p id="tx-error-message" class="tx-error-detail">
            Refer to logs in your user-data folder if this persists.
          </p>
        </div>

        <p class="tx-error-hint">
          Report this on GitHub with any details you remember from the message above.
        </p>

        <div class="tx-error-actions">
          <a
            id="tx-error-report"
            class="tx-error-btn tx-error-btn--secondary"
            href="https://github.com/matthiaskopeinigg/testrix/issues/new"
            target="_blank"
            rel="noopener noreferrer"
          >
            Report on GitHub
          </a>
          <button type="button" class="tx-error-btn tx-error-btn--primary tx-error-close">
            Close Testrix
          </button>
        </div>
      </main>
    </div>

    <script>
      ;(() => {
        const closeWindow = () => {
          window.close();
        };

        /**
         * Applies the startup failure message and pre-filled GitHub issue link.
         *
         * @param {string} message
         * @param {string} reportUrl
         */
        window.txErrorSetup = (message, reportUrl) => {
          const messageEl = document.getElementById('tx-error-message');
          if (messageEl) {
            messageEl.textContent = message;
            messageEl.title = message;
          }

          const reportEl = document.getElementById('tx-error-report');
          if (reportEl && reportUrl) {
            reportEl.href = reportUrl;
          }
        };

        document.querySelector('.tx-error-titlebar__close')?.addEventListener('click', closeWindow);
        document.querySelector('.tx-error-close')?.addEventListener('click', closeWindow);
      })();
    </script>
  </body>
</html>
