# Local Redis for DATABASE steps (Settings → Databases: type Redis, host localhost, port 6379, DB index 0).
# Redis Commander UI for seeding keys: http://localhost:8081
# Usage: docker compose up -d
# Stop:   docker compose down

services:
  redis:
    image: redis:7-alpine
    container_name: api-workbench-redis
    hostname: redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    container_name: api-workbench-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
