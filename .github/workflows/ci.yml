name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint build + unit smoke (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Ensure optional lock entries
        run: node scripts/ensure-emnapi-lock.mjs

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: |
          set -o pipefail
          npm run test 2>&1 | tee test-output.log
          if grep -E "Tests +[1-9][0-9]* failed" test-output.log; then
            exit 1
          fi

  build-smoke:
    name: Build smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Ensure optional lock entries
        run: node scripts/ensure-emnapi-lock.mjs

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
