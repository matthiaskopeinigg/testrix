name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Test gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: |
          set -o pipefail
          npm run test 2>&1 | tee test-output.log
          if grep -E "Tests +[1-9][0-9]* failed" test-output.log; then
            exit 1
          fi

  release-windows:
    name: Windows installer
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build and sign Windows installer
        run: npm run electron:pack:release
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Testrix ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/Testrix-Setup.exe
          fail_on_unmatched_files: true
