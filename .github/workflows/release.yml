name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  test:
    name: Test gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Ensure optional lock entries
        run: node scripts/ensure-emnapi-lock.mjs

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: |
          set -o pipefail
          npm run test 2>&1 | tee test-output.log
          if grep -E "Tests +[1-9][0-9]* failed" test-output.log; then
            exit 1
          fi

  release-windows:
    name: Windows installer
    needs: test
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Ensure optional lock entries
        run: node scripts/ensure-emnapi-lock.mjs

      - name: Install
        run: npm ci

      - name: Build and sign Windows installer (stable)
        if: ${{ !contains(github.ref_name, '-') }}
        run: npm run electron:pack:release
        env:
          REQUIRE_WIN_CODE_SIGN: '1'
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build Windows installer (prerelease)
        if: ${{ contains(github.ref_name, '-') }}
        run: npm run electron:build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/Testrix Setup.exe

  release-linux:
    name: Linux installer
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Ensure optional lock entries
        run: node scripts/ensure-emnapi-lock.mjs

      - name: Install
        run: npm ci

      - name: Build Linux installer
        run: npm run electron:build:linux

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: release/Testrix Setup.AppImage

  release-mac:
    name: macOS installer
    needs: test
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Ensure optional lock entries
        run: node scripts/ensure-emnapi-lock.mjs

      - name: Install
        run: npm ci

      - name: Build macOS installer
        run: npm run electron:build:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/Testrix Setup.dmg

  publish-release:
    name: Publish GitHub Release
    needs: [release-windows, release-linux, release-mac]
    runs-on: ubuntu-latest

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Testrix ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            artifacts/**/*
          fail_on_unmatched_files: true
