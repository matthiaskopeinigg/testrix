<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:7736"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Testrix</title>
    <link rel="stylesheet" href="./splash.css" />
  </head>
  <body>
    <!-- Centered splash card (parity with api-workbench boot splash framing). -->
    <div class="tx-splash-shell">
      <div class="tx-splash-stage">
        <img class="tx-splash-logo" src="./assets/logo.svg" alt="Testrix" width="240" height="240" />
        <p id="tx-splash-version" class="tx-splash-version"></p>
        <div class="tx-splash-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const version = params.get('version');
      const node = document.getElementById('tx-splash-version');
      if (node) {
        node.textContent = version ? 'v' + version : '';
      }
      // #region agent log
      (function agentSplashProbe() {
        const endpoint = 'http://127.0.0.1:7736/ingest/d5806da4-cf16-47c7-b1e3-a0241cdfcf92';
        const log = (location, message, data, hypothesisId) => {
          fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Debug-Session-Id': 'e8295c' },
            body: JSON.stringify({ sessionId: 'e8295c', location, message, data, hypothesisId, timestamp: Date.now(), runId: 'pre-fix' }),
          }).catch(() => {});
        };
        const spinners = document.querySelectorAll('.tx-splash-spinner');
        const spinner = spinners[0];
        const stage = document.querySelector('.tx-splash-stage');
        const spinnerStyle = spinner ? getComputedStyle(spinner) : null;
        const stageStyle = stage ? getComputedStyle(stage) : null;
        log('electron/splash.html:probe', 'standalone splash DOM/CSS snapshot', {
          surface: 'main-app-splash-window',
          spinnerCount: spinners.length,
          htmlBg: getComputedStyle(document.documentElement).backgroundColor,
          bodyBg: getComputedStyle(document.body).backgroundColor,
          shellBg: getComputedStyle(document.querySelector('.tx-splash-shell')).backgroundColor,
          spinnerAnimation: spinnerStyle ? spinnerStyle.animationName : null,
          spinnerTransform: spinnerStyle ? spinnerStyle.transform : null,
          stageAnimation: stageStyle ? stageStyle.animationName : null,
          stageTransform: stageStyle ? stageStyle.transform : null,
        }, 'H5');
        setTimeout(() => {
          const later = spinner ? getComputedStyle(spinner) : null;
          log('electron/splash.html:probe-delayed', 'spinner animation check after 600ms', {
            surface: 'main-app-splash-window',
            spinnerAnimation: later ? later.animationName : null,
            spinnerTransform: later ? later.transform : null,
            animationRunning: later ? later.animationName !== 'none' : false,
          }, 'H3');
        }, 600);
      })();
      // #endregion
    </script>
  </body>
</html>
